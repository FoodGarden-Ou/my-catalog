<main class="content-container">
    <h1 class="main-category-title">聯絡我們</h1>
    <div class="green-line"></div>

    <div class="contact-wrapper">
        <div class="contact-info">
            <div class="info-item">
                <h3>電話</h3>
                <p>02-1234-5678</p>
            </div>
            <div class="info-item">
                <h3>地址</h3>
                <p>100 台北市中正區某某路 123 號</p>
            </div>
            <div class="info-item">
                <h3>營業時間</h3>
                <p>週一至週五 09:00 - 18:00</p>
            </div>
        </div>

        <div class="contact-form-box">
            <h3>在線諮詢</h3>
            <form id="contact-form">
                <input type="text" id="name" placeholder="您的姓名" required>
                <input type="email" id="email" placeholder="電子郵件" required>
                <textarea id="message" rows="5" placeholder="請輸入您的需求或問題..." required></textarea>
                <button type="submit" id="submit-btn">送出訊息</button>
            </form>
            <div id="form-status"></div> </div>
    </div>
</main>
