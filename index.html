<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式目錄系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="hero-content">圖片 1</div>
    </header>

    <div class="container">
        <section class="title-bar">
            <h1>X X</h1>
        </section>

        <nav class="nav-container">
            <div class="nav-item-wrapper">
                <div class="nav-item" id="nav-intro" onclick="showIntro()">介紹</div>
            </div>
            
            <div class="nav-item-wrapper">
                <div class="nav-item" id="menu-main" onclick="toggleMain()">目錄</div>
                
                <div class="menu-outer-box" id="submenu-abc" style="display: none;">
                    <div class="menu-header">目錄</div>
                    <div class="menu-flex-container">
                        <div id="category-list" class="category-column"></div>
                        <div id="third-container" class="number-column"></div>
                    </div>
                </div>
            </div>

            <div class="nav-item-wrapper">
                <div class="nav-item">聯絡我們</div>
            </div>
        </nav>

        <main class="content-section">
            <div id="intro-view">
                <h3>介紹：</h3>
                <p>. . . . . .</p>
            </div>

            <div id="detail-view" style="display: none;">
                <div class="layout-wrapper">
                    <div class="image-box">圖片 2</div>
                    <div class="text-wrapper" id="dynamic-content"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
