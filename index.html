<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式目錄系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="container hero-content">圖片 1</div>
    </header>

    <div class="container">
        <section class="title-bar">
            <h1>X X</h1>
        </section>

        <nav class="nav-container">
            <div class="nav-item-wrapper">
                <div class="nav-item" id="nav-intro" onclick="showIntro()">介紹</div>
            </div>
            
            <div class="nav-item-wrapper">
                <div class="nav-item" id="menu-main" onclick="toggleMain()">目錄</div>
                
                <div class="menu-bg" id="submenu-abc">
                    
                    <div class="sub-item-group">
                        <div class="sub-item" onclick="toggleSub(this, 'sub-A')">A</div>
                        <div class="menu-bg third" id="sub-A">
                            <div class="sub-item" onclick="changeContent('4', this)">4</div>
                            <div class="sub-item" onclick="changeContent('5', this)">5</div>
                            <div class="sub-item" onclick="changeContent('6', this)">6</div>
                        </div>
                    </div>

                    <div class="sub-item-group">
                        <div class="sub-item" onclick="toggleSub(this, 'sub-B')">B</div>
                        <div class="menu-bg third" id="sub-B">
                            <div class="sub-item" onclick="changeContent('1', this)">1</div>
                            <div class="sub-item" onclick="changeContent('2', this)">2</div>
                            <div class="sub-item" onclick="changeContent('3', this)">3</div>
                        </div>
                    </div>

                    <div class="sub-item-group">
                        <div class="sub-item" onclick="toggleSub(this, 'sub-C')">C</div>
                        <div class="menu-bg third" id="sub-C">
                            <div class="sub-item" onclick="changeContent('7', this)">7</div>
                            <div class="sub-item" onclick="changeContent('8', this)">8</div>
                            <div class="sub-item" onclick="changeContent('9', this)">9</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-item-wrapper">
                <div class="nav-item">聯絡我們</div>
            </div>
        </nav>

        <main class="content-section" id="main-content">
            <div id="intro-view">
                <h3>介紹：</h3>
                <p>. . . . . .</p>
            </div>

            <div id="detail-view" style="display: none;">
                <div class="image-box">圖片 2</div>
                <div class="text-wrapper" id="dynamic-content">
                    </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
